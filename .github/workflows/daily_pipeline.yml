name: Daily pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run ingestion
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          LICHESS_USERNAME: ${{ secrets.LICHESS_USERNAME }}
          CHESSCOM_USERNAME: ${{ secrets.CHESSCOM_USERNAME }}
          DESTINATION: motherduck
        run: make ingest
